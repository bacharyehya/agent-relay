name: AgentRelay
options:
  bundleIdPrefix: io.agentrelay
packages:
  AgentRelayPackage:
    path: .
targets:
  AgentRelayMac:
    type: application
    platform: macOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - App/MacApp
    dependencies:
      - package: AgentRelayPackage
        product: AppCore
